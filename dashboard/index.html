<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QA Chat Tester</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
  --accent:#6c63ff;--accent2:#00d4aa;--danger:#ff4d6d;--warn:#ffd166;
  --text:#e2e8f0;--muted:#7c85a2;--green:#4ade80;--red:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
     font-size:14px;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
         display:flex;flex-direction:column;padding:16px 0}
.sidebar-logo{padding:0 20px 20px;font-size:15px;font-weight:700;color:var(--accent);
              border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo span{color:var(--accent2)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;
          color:var(--muted);transition:.15s;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(108,99,255,.08)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:12px 20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);
        padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:16px;font-weight:600}
.topbar .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.topbar .status-dot.red{background:var(--red)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-card .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .value.accent{color:var(--accent)}
.stat-card .value.green{color:var(--green)}
.stat-card .value.teal{color:var(--accent2)}
.stat-card .value.warn{color:var(--warn)}

/* ── TABLES ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;
             display:flex;align-items:center;justify-content:space-between}
.card-header .actions{display:flex;gap:8px}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);color:var(--muted);font-size:11px;text-transform:uppercase;
   letter-spacing:.05em;padding:10px 14px;text-align:left;font-weight:600}
td{padding:10px 14px;border-top:1px solid var(--border);vertical-align:middle;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--surface2);cursor:pointer}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;
     font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a52e0}
.btn-success{background:#166534;color:#4ade80;border:1px solid #15803d}
.btn-success:hover{background:#14532d}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
.btn-danger:hover{background:#450a0a}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#14532d;color:#4ade80}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-blue{background:#1e3a5f;color:#93c5fd}
.badge-gray{background:var(--surface2);color:var(--muted)}

/* ── CONVERSATION DETAIL ── */
.conv-detail{background:var(--surface);border:1px solid var(--border);border-radius:10px;
             display:flex;flex-direction:column;height:calc(100vh - 100px)}
.conv-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
             align-items:center;gap:10px;flex-wrap:wrap}
.conv-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:0}
/* timeline turn */
.tl-turn{display:flex;flex-direction:column;gap:0;position:relative;padding-left:16px;margin-bottom:4px;margin-left:32px}
.tl-turn::before{content:'';position:absolute;left:-6px;top:28px;bottom:0;width:2px;background:var(--border)}
.tl-turn:last-child::before{display:none}
/* avatar dot */
.tl-dot{position:absolute;left:6px;top:10px;width:18px;height:18px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.tl-dot.user{background:var(--accent);color:#fff}
.tl-dot.bot{background:var(--surface2);color:var(--accent2);border:1px solid var(--border)}
/* message row */
.tl-row{display:flex;flex-direction:column;gap:3px;padding:10px 0 6px}
.tl-row + .tl-row{padding-top:4px;border-top:1px dashed var(--border);margin-top:2px}
.tl-who{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.tl-who.user{color:var(--accent)}
.tl-who.bot{color:var(--accent2)}
.tl-time{font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0}
.tl-text{font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;
         padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-top:2px}
.tl-row.user .tl-text{background:rgba(108,99,255,.12);border-color:rgba(108,99,255,.25)}
.tl-turn-num{position:absolute;left:-28px;top:8px;width:22px;height:22px;border-radius:50%;
             background:var(--surface2);border:1px solid var(--border);color:var(--muted);
             font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;
             cursor:pointer;transition:.15s;user-select:none}
.tl-turn-num:hover{background:var(--accent);border-color:var(--accent);color:#fff}
/* campaign trigger banner */
.tl-campaign{display:flex;align-items:center;gap:6px;padding:5px 10px;margin-bottom:4px;
             background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.25);
             border-radius:6px;font-size:11px;color:var(--accent2);font-weight:600}
.tl-campaign-label{font-weight:400;color:var(--muted);margin-left:2px}
/* raw modal */
.raw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
             justify-content:center;z-index:200;padding:20px}
.raw-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
         width:100%;max-width:780px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.raw-box-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
                align-items:center;justify-content:space-between;flex-shrink:0}
.raw-box-header h3{font-size:14px;font-weight:600}
.raw-body{overflow-y:auto;padding:16px;flex:1}
.raw-body pre{font-family:'JetBrains Mono','Fira Code',monospace;font-size:11.5px;
              line-height:1.65;color:#e6edf3;background:#0d1117;padding:14px;
              border-radius:8px;white-space:pre-wrap;word-break:break-all;margin:0}
/* media attachments */
.tl-media{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.tl-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;
          border:2px solid var(--border);transition:.15s}
.tl-thumb:hover{border-color:var(--accent);transform:scale(1.04)}
.tl-file{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;
         background:var(--surface2);border:1px solid var(--border);border-radius:7px;
         font-size:12px;color:var(--text);cursor:pointer;text-decoration:none;transition:.15s}
.tl-file:hover{border-color:var(--accent);color:var(--accent)}
.tl-file-icon{font-size:16px;line-height:1}
/* lightbox */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;
            align-items:center;justify-content:center;z-index:300;padding:20px;cursor:zoom-out}
.lb-inner{position:relative;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:10px}
.lb-img{max-width:100%;max-height:82vh;border-radius:8px;object-fit:contain;box-shadow:0 8px 40px #000}
.lb-pdf{width:90vw;height:85vh;border:none;border-radius:8px}
.lb-bar{display:flex;align-items:center;gap:12px}
.lb-caption{color:#ccc;font-size:12px;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;
          width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,.3)}
.case-panel{margin:0 0 12px 0;border-radius:10px;background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.15);overflow:hidden;flex-shrink:0}
.case-panel-head{padding:8px 14px;display:flex;align-items:center;gap:8px;background:rgba(99,102,241,.07);border-bottom:1px solid rgba(99,102,241,.1)}
.case-panel-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#818cf8}
.case-panel-user{font-size:12px;font-weight:600;color:var(--text);flex:1}
.case-panel-camps{display:flex;flex-wrap:wrap;gap:4px}
.case-camp-chip{font-size:10px;padding:2px 7px;border-radius:12px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);color:var(--accent2)}
.case-panel-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.case-field{display:flex;gap:10px;align-items:flex-start}
.case-field-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);min-width:96px;padding-top:2px;flex-shrink:0}
.case-field-val{font-size:12px;color:var(--text);line-height:1.55;flex:1;word-break:break-word}
.case-field-val.mono{font-family:monospace;font-size:11px;color:var(--muted)}
.case-prompt-wrap{position:relative}
.case-prompt-text{white-space:pre-wrap;overflow:hidden;max-height:52px;transition:max-height .25s ease}
.case-prompt-text.expanded{max-height:600px}
.case-prompt-fade{position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(16,17,24,.9));pointer-events:none;transition:opacity .2s}
.case-prompt-text.expanded+.case-prompt-fade{opacity:0}
.case-toggle{background:none;border:none;color:#818cf8;font-size:10px;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:2px}
.case-toggle:hover{color:#a5b4fc}
.case-divider{border:none;border-top:1px solid rgba(99,102,241,.1);margin:4px 0}
.case-extras{display:none;flex-direction:column;gap:6px}
.case-extras.visible{display:flex}
.insight-box{margin:16px;padding:14px;border-radius:10px;color:var(--text);line-height:1.6;font-size:13px;border-left:3px solid var(--border)}
.insight-box.ok{background:rgba(74,222,128,.06);border-color:#4ade80}
.insight-box.fail{background:rgba(248,113,113,.06);border-color:#f87171}
.insight-box.pending{background:rgba(251,191,36,.06);border-color:#fbbf24}
.insight-box .insight-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.insight-box.ok .insight-label{color:#4ade80}
.insight-box.fail .insight-label{color:#f87171}
.insight-box.pending .insight-label{color:#fbbf24}
.back-btn{margin-bottom:16px}

/* ── CASES EDITOR ── */
.editor-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.editor-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.editor-status{margin-left:auto;font-size:12px;color:var(--muted)}
textarea.code{width:100%;background:#0d1117;color:#e6edf3;border:none;padding:16px;
              font-family:'JetBrains Mono','Fira Code',monospace;font-size:12.5px;
              line-height:1.65;resize:none;outline:none;tab-size:2;
              height:calc(100vh - 220px);min-height:300px}

/* ── RUN PANEL ── */
.run-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.form-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.form-group label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
.form-group input{background:var(--surface2);border:1px solid var(--border);color:var(--text);
                  padding:8px 12px;border-radius:7px;font-size:13px;outline:none}
.form-group input:focus{border-color:var(--accent)}
.terminal{background:#0d1117;border:1px solid var(--border);border-radius:10px;
          padding:14px;height:340px;overflow-y:auto;font-family:'JetBrains Mono','Fira Code',monospace;
          font-size:12px;line-height:1.6;color:#8b949e}
.terminal .t-line{padding:1px 0}
.terminal .t-line.err{color:#f87171}
.terminal .t-line.ok{color:#4ade80}
.terminal .t-line.info{color:#93c5fd}
.terminal .t-line.warn{color:#fbbf24}
.terminal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.run-status{display:flex;align-items:center;gap:8px;font-size:12px}
.pulse{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
              gap:14px;padding:48px;color:var(--muted);font-size:12px;letter-spacing:.04em}
.spinner{width:32px;height:32px;border-radius:50%;
         border:3px solid var(--border);
         border-top-color:var(--accent);
         animation:spin .7s linear infinite}
.spinner.sm{width:18px;height:18px;border-width:2px}

/* ── MISC ── */
.empty-state{text-align:center;padding:48px;color:var(--muted)}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:.3}
.refresh-btn{font-size:11px;padding:5px 10px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
               letter-spacing:.07em;margin-bottom:14px}
.tag{display:inline-block;background:var(--surface2);border:1px solid var(--border);
     border-radius:5px;padding:2px 7px;font-size:11px;color:var(--muted);margin:2px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;
                 align-items:center;justify-content:center;z-index:100}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
             padding:28px;max-width:380px;width:90%;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:10px}
.confirm-box p{color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.5}
.confirm-box .actions{display:flex;gap:10px;justify-content:center}
.hidden{display:none!important}

/* ── SEARCH BAR ── */
.search-bar{display:flex;gap:8px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
.search-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
               padding:7px 10px;border-radius:7px;font-size:12px;outline:none;cursor:pointer}
.search-select:focus{border-color:var(--accent)}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
              padding:7px 12px;border-radius:7px;font-size:12px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}

/* ── STATUS CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.chip-green{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.chip-red{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
.chip-blue{background:rgba(147,197,253,.1);color:#93c5fd;border:1px solid rgba(147,197,253,.2)}
.chip-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.chip-orange{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}

/* ── ANÁLISIS PAGE ── */
.analysis-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
               padding:16px 18px;margin-bottom:10px;border-left:3px solid var(--border);transition:.15s}
.analysis-card.ok{border-left-color:var(--green)}
.analysis-card.fail{border-left-color:var(--red)}
.analysis-card.pending{border-left-color:var(--warn)}
.analysis-card:hover{background:var(--surface2)}
.analysis-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.analysis-text{font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;
               word-break:break-word;max-height:72px;overflow:hidden;position:relative}
.analysis-text::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;
                      background:linear-gradient(transparent,var(--surface))}
.analysis-text.expanded{max-height:none}
.analysis-text.expanded::after{display:none}
.analysis-card:hover .analysis-text::after{background:linear-gradient(transparent,var(--surface2))}
.analysis-actions{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:8px;
                  border-top:1px solid var(--border)}
/* ── ANÁLISIS CHARTS ── */
.an-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.an-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.an-stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.an-stat-val{font-size:26px;font-weight:700}
.an-stat-sub{font-size:11px;color:var(--muted)}
.an-stat.ok   .an-stat-val{color:var(--green)}
.an-stat.fail .an-stat-val{color:var(--red)}
.an-stat.pend .an-stat-val{color:var(--warn)}
.an-charts-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.an-chart-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:220px}
.an-chart-box.wide{flex:2;min-width:280px}
.an-chart-title{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-bottom:10px}
.an-filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 0 10px;border-top:1px solid var(--border);margin-top:4px}
.an-filter-group{display:flex;gap:4px;flex-wrap:wrap}
.an-filter-btn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;
               color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.an-filter-btn:hover{color:var(--text);border-color:var(--text)}
.an-filter-btn.active.ok  {background:rgba(74,222,128,.15);border-color:#4ade80;color:#4ade80}
.an-filter-btn.active.fail{background:rgba(248,113,113,.15);border-color:#f87171;color:#f87171}
.an-filter-btn.active.pend{background:rgba(251,191,36,.15);border-color:#fbbf24;color:#fbbf24}
.an-filter-btn.active.all {background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent)}
/* ── PAGINATION ── */
.an-pagination{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pg-btn{min-width:30px;height:28px;padding:0 7px;border-radius:6px;border:1px solid var(--border);
        background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;justify-content:center}
.pg-btn:hover:not(:disabled){background:var(--surface2);color:var(--text);border-color:var(--text)}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}
.pg-ellipsis{color:var(--muted);font-size:12px;padding:0 4px}
.pg-info{font-size:11px;color:var(--muted);margin-left:6px;white-space:nowrap}
/* ── REPORT MODAL ── */
.report-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;
                justify-content:center;z-index:200;padding:20px}
.report-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
            width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.report-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;
             justify-content:space-between;flex-shrink:0}
.report-head h3{font-size:15px;font-weight:700}
.report-head-actions{display:flex;gap:8px}
.report-body{overflow-y:auto;padding:20px;flex:1;font-size:13px;line-height:1.7}
.report-section{margin-bottom:24px}
.report-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;
                   color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.report-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px}
.report-kpi{background:var(--surface2);border-radius:8px;padding:10px 14px;text-align:center}
.report-kpi .rk-val{font-size:22px;font-weight:700;margin-bottom:2px}
.report-kpi .rk-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.report-kpi.ok .rk-val{color:var(--green)}
.report-kpi.fail .rk-val{color:var(--red)}
.report-kpi.pend .rk-val{color:var(--warn)}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{background:var(--surface2);color:var(--muted);font-size:10px;text-transform:uppercase;
                 letter-spacing:.05em;padding:8px 12px;text-align:left;font-weight:600}
.report-table td{padding:8px 12px;border-top:1px solid var(--border);vertical-align:top}
.report-table tr:hover td{background:var(--surface2)}
.report-fail-item{padding:10px 14px;border-radius:8px;background:rgba(248,113,113,.05);
                  border:1px solid rgba(248,113,113,.15);margin-bottom:8px}
.report-fail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.report-fail-text{font-size:12px;color:var(--muted);line-height:1.5;white-space:pre-wrap}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">QA Chat<span>Tester</span></div>
  <div class="nav-item active" data-page="dashboard" onclick="showPage('dashboard',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  <div class="nav-item" data-page="conversations" onclick="showPage('conversations',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Conversaciones
  </div>
  <div class="nav-item" data-page="analyses" onclick="showPage('analyses',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Análisis
  </div>
  <div class="nav-item" data-page="cases" onclick="showPage('cases',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Cases JSON

  <div class="nav-item" data-page="run" onclick="showPage('run',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Ejecutar
  </div>
  <div class="sidebar-footer" id="sidebarStatus">● Conectado</div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h1 id="pageTitle">Dashboard</h1>
    <div>
      <span class="status-dot" id="globalDot"></span>
      <span id="globalStatus" style="font-size:12px;color:var(--muted)">Listo</span>
    </div>
  </div>
  <div class="content" id="content">
    <!-- dynamic content here -->
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-overlay hidden" id="confirmModal">
  <div class="confirm-box">
    <h3 id="confirmTitle">¿Confirmar acción?</h3>
    <p id="confirmMsg"></p>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirmOkBtn">Confirmar</button>
    </div>
  </div>
</div>

<div class="raw-overlay hidden" id="rawModal">
  <div class="raw-box">
    <div class="raw-box-header">
      <h3 id="rawModalTitle">raw_response</h3>
      <button class="btn btn-ghost" style="padding:4px 10px" onclick="closeRawModal()">✕ Cerrar</button>
    </div>
    <div class="raw-body">
      <pre id="rawModalContent"></pre>
    </div>
  </div>
</div>

<div class="lb-overlay hidden" id="lbModal" onclick="closeLb(event)">
  <div class="lb-inner" onclick="event.stopPropagation()">
    <div class="lb-bar">
      <span class="lb-caption" id="lbCaption"></span>
      <a id="lbDownload" href="#" download target="_blank"
         class="btn btn-ghost" style="padding:4px 10px;font-size:11px">⬇ Descargar</a>
      <button class="lb-close" onclick="closeLb()">✕</button>
    </div>
    <img id="lbImg" class="lb-img hidden" src="" alt=""/>
    <iframe id="lbPdf" class="lb-pdf hidden" src=""></iframe>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let pollTimer = null;
let sseSource = null;
let convList = [];
let currentConvId = null;
let convSearchField = 'session_id';
let convSearchQuery = '';
let convFilterStatus = 'all';
let convFilterObjective = 'all';
let analysesList = [];
let analysisSearchQuery = '';
let analysisFilterStatus   = 'all'; // 'all' | 'ok' | 'fail' | 'pending'
let analysisFilterGroup    = '';
let analysisFilterCampaign = '';

// ── Navigation ──────────────────────────────────────────────────────────────
function showPage(name, el) {
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const titles = {dashboard:'Dashboard', conversations:'Conversaciones', analyses:'Análisis', cases:'Cases JSON', run:'Ejecutar Batch'};
  document.getElementById('pageTitle').textContent = titles[name] || name;
  clearInterval(pollTimer);
  if (sseSource) { sseSource.close(); sseSource = null; }
  currentConvId = null;
  if (name === 'conversations') { convPage = 1; convSearchQuery = ''; convFilterStatus = 'all'; convFilterObjective = 'all'; }
  if (name === 'analyses') { analysisSearchQuery = ''; analysisFilterStatus = 'all'; analysisFilterGroup = ''; analysisFilterCampaign = ''; }
  render();
}

function render() {
  const c = document.getElementById('content');
  if (currentPage === 'dashboard')         renderDashboard(c);
  else if (currentPage === 'conversations') renderConversations(c);
  else if (currentPage === 'analyses')      renderAnalyses(c);
  else if (currentPage === 'cases')         renderCases(c);
  else if (currentPage === 'run')           renderRun(c);
}

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
async function renderDashboard(c) {
  c.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Sesiones</div><div class="value accent" id="st-sessions">…</div></div>
      <div class="stat-card"><div class="label">Mensajes</div><div class="value green" id="st-messages">…</div></div>
      <div class="stat-card"><div class="label">Insights</div><div class="value teal" id="st-insights">…</div></div>
      <div class="stat-card"><div class="label">Runs</div><div class="value warn" id="st-runs">…</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        Últimas conversaciones
        <div class="actions">
          <button class="btn btn-ghost refresh-btn" onclick="refreshDashboard()">↻ Actualizar</button>
          <button class="btn btn-danger refresh-btn" onclick="confirmClearDB()">🗑 Limpiar DB</button>
        </div>
      </div>
      <div id="dash-conv-table">${loading()}</div>
    </div>
  `;
  await refreshDashboard();
  pollTimer = setInterval(refreshDashboard, 5000);
}

async function refreshDashboard() {
  const [stats, convs] = await Promise.all([
    api('GET', '/api/stats'),
    api('GET', '/api/conversations'),
  ]);
  convList = convs;
  document.getElementById('st-sessions').textContent = stats.sessions ?? '–';
  document.getElementById('st-messages').textContent = stats.messages ?? '–';
  document.getElementById('st-insights').textContent = stats.insights ?? '–';
  document.getElementById('st-runs').textContent    = stats.runs ?? '–';

  const el = document.getElementById('dash-conv-table');
  if (!el) return;
  if (!convs.length) { el.innerHTML = `<div class="empty-state">Sin conversaciones</div>`; return; }
  el.innerHTML = `<table>
    <thead><tr>
      <th>Session</th><th>Escenario</th><th>Usuario</th>
      <th>Mensajes</th><th>Insight</th><th>Último</th>
    </tr></thead>
    <tbody>
    ${convs.slice(0,30).map(r => `<tr onclick="openConversation('${r.session_id}')">
      <td style="font-family:monospace;font-size:11px">${r.session_id.slice(0,16)}…</td>
      <td title="${r.scenario||''}">${r.scenario_group_id||'–'}</td>
      <td>${r.user_id||'–'}</td>
      <td><span class="badge badge-blue">${r.message_count}</span></td>
      <td>${r.insight_complete===1?'<span class="badge badge-green">✓</span>':r.insight_complete===0&&r.insight_summary?'<span class="badge badge-gray">pendiente</span>':'<span class="badge badge-gray">–</span>'}</td>
      <td style="color:var(--muted);font-size:11px">${fmtDate(r.last_message_at)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

function openConversation(sid) {
  currentConvId = sid;
  showPage('conversations', document.querySelector('[data-page="conversations"]'));
}

// ── CONVERSATIONS ──────────────────────────────────────────────────────────────
let convPage = 1;
const CONV_PAGE_SIZE = 20;

async function renderConversations(c) {
  if (currentConvId) {
    renderConvDetail(c, currentConvId);
    return;
  }
  c.innerHTML = `
    <div class="card">
      <div class="card-header">
        Conversaciones
        <div id="conv-counters" style="font-size:12px;color:var(--muted);font-weight:400;margin-left:8px"></div>
        <div class="actions">
          <button class="btn btn-ghost refresh-btn" onclick="loadConvList()">↻ Actualizar</button>
          <a class="btn btn-success refresh-btn" href="/api/export/conversations" download="conversaciones.xlsx">⬇ Exportar Excel</a>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)">
        <div class="search-bar" style="flex:1;min-width:260px;margin:0;border:none;padding:0">
          <select class="search-select" id="conv-field-sel" onchange="convSearch()" title="Campo de búsqueda">
            <option value="session_id">Session ID</option>
            <option value="run_id">Run ID</option>
            <option value="user_id">Usuario</option>
            <option value="scenario">Escenario</option>
            <option value="scenario_group_id">Grupo</option>
          </select>
          <input class="search-input" id="conv-search-q" type="text"
                 placeholder="Buscar…" oninput="convSearch()" value="${escHtml(convSearchQuery)}"/>
          <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="clearConvSearch()">✕</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:11px;color:var(--muted);font-weight:600">Estado:</span>
          <button id="fs-all"  class="btn btn-ghost conv-filter-btn ${convFilterStatus==='all'?'btn-primary':''}"  style="font-size:11px;padding:4px 10px" onclick="setConvFilter('status','all')">Todas</button>
          <button id="fs-done" class="btn btn-ghost conv-filter-btn ${convFilterStatus==='done'?'btn-primary':''}" style="font-size:11px;padding:4px 10px" onclick="setConvFilter('status','done')">Analizadas</button>
          <button id="fs-pend" class="btn btn-ghost conv-filter-btn ${convFilterStatus==='pend'?'btn-primary':''}" style="font-size:11px;padding:4px 10px" onclick="setConvFilter('status','pend')">En curso</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:11px;color:var(--muted);font-weight:600">Objetivo:</span>
          <button id="fo-all"  class="btn btn-ghost conv-filter-btn ${convFilterObjective==='all'?'btn-primary':''}"  style="font-size:11px;padding:4px 10px" onclick="setConvFilter('obj','all')">Todos</button>
          <button id="fo-ok"   class="btn btn-ghost conv-filter-btn ${convFilterObjective==='ok'?'btn-primary':''}"   style="font-size:11px;padding:4px 10px" onclick="setConvFilter('obj','ok')">Cumplido</button>
          <button id="fo-fail" class="btn btn-ghost conv-filter-btn ${convFilterObjective==='fail'?'btn-primary':''}" style="font-size:11px;padding:4px 10px" onclick="setConvFilter('obj','fail')">No cumplido</button>
        </div>
      </div>
      <div id="conv-list-wrap">${loading()}</div>
      <div id="conv-pagination" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border)"></div>
    </div>`;
  // restore field selector
  const sel = document.getElementById('conv-field-sel');
  if (sel) sel.value = convSearchField;
  await loadConvList();
  pollTimer = setInterval(loadConvList, 6000);
}

function convSearch() {
  convSearchField = document.getElementById('conv-field-sel')?.value || 'session_id';
  convSearchQuery = document.getElementById('conv-search-q')?.value || '';
  convPage = 1;
  renderConvPage();
}

function clearConvSearch() {
  convSearchQuery = '';
  const el = document.getElementById('conv-search-q');
  if (el) el.value = '';
  convPage = 1;
  renderConvPage();
}

function setConvFilter(type, val) {
  if (type === 'status') convFilterStatus = val;
  else convFilterObjective = val;
  convPage = 1;
  renderConvPage();
}

async function loadConvList() {
  convList = await api('GET', '/api/conversations');
  renderConvPage();
}

function renderConvPage() {
  const el = document.getElementById('conv-list-wrap');
  const pg = document.getElementById('conv-pagination');
  if (!el) return;

  // ── counters (always over full list) ──
  const totalAll    = convList.length;
  const totalDone   = convList.filter(r => r.insight_summary != null || r.insight_complete != null).length;
  const totalOk     = convList.filter(r => r.insight_complete === 1).length;
  const ctrEl = document.getElementById('conv-counters');
  if (ctrEl) ctrEl.innerHTML =
    `${totalAll} conversaciones · <span style="color:var(--accent2)">${totalDone} analizadas</span> · <span style="color:var(--green)">${totalOk} objetivo cumplido</span>`;

  // ── update filter button active state ──
  ['all','done','pend'].forEach(v => document.getElementById('fs-'+v)?.classList.toggle('btn-primary', convFilterStatus===v));
  ['all','ok','fail'].forEach(v  => document.getElementById('fo-'+v)?.classList.toggle('btn-primary', convFilterObjective===v));

  // ── apply filters ──
  let filtered = convList;
  if (convSearchQuery)
    filtered = filtered.filter(r => (String(r[convSearchField] || '')).toLowerCase().includes(convSearchQuery.toLowerCase()));
  if (convFilterStatus === 'done')
    filtered = filtered.filter(r => r.insight_summary != null || r.insight_complete != null);
  else if (convFilterStatus === 'pend')
    filtered = filtered.filter(r => r.insight_summary == null && r.insight_complete == null);
  if (convFilterObjective === 'ok')
    filtered = filtered.filter(r => r.insight_complete === 1);
  else if (convFilterObjective === 'fail')
    filtered = filtered.filter(r => r.insight_complete === 0);

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">Sin resultados para los filtros aplicados</div>`;
    if (pg) pg.innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filtered.length / CONV_PAGE_SIZE);
  if (convPage > totalPages) convPage = totalPages;
  const start = (convPage - 1) * CONV_PAGE_SIZE;
  const page  = filtered.slice(start, start + CONV_PAGE_SIZE);

  el.innerHTML = `<table>
    <thead><tr>
      <th>Session ID</th><th>Run ID</th><th>Escenario</th><th>Usuario</th>
      <th>Msjs</th><th>Campaigns</th><th>Estado</th><th>Objetivo</th><th>Inicio</th>
    </tr></thead>
    <tbody>
    ${page.map(r => {
      const hasAnalysis = r.insight_summary != null || r.insight_complete != null;
      const estadoBadge = hasAnalysis
        ? `<span class="chip chip-blue">✓ Analizada</span>`
        : `<span class="chip chip-orange">⏳ En curso</span>`;
      const objetivoBadge = !hasAnalysis
        ? `<span style="color:var(--muted);font-size:11px">–</span>`
        : r.insight_complete === 1
          ? `<span class="chip chip-green">✓ Cumplido</span>`
          : `<span class="chip chip-red">✗ No cumplido</span>`;
      const camps = Array.isArray(r.campaigns) ? r.campaigns : [];
      const campHtml = camps.length
        ? camps.map(c => `<span class="tag" style="color:var(--accent2);border-color:rgba(0,212,170,.3)" title="${escHtml(c.campaign_id||'')}">📣 ${escHtml(c.campaign_name||c.campaign_id||'–')}</span>`).join('')
        : `<span style="color:var(--muted);font-size:11px">–</span>`;
      return `<tr onclick="openConvDetail('${r.session_id}')">
        <td style="font-family:monospace;font-size:11px" title="${r.session_id}">${r.session_id.slice(0,18)}…</td>
        <td style="font-family:monospace;font-size:11px" title="${r.run_id||''}">${r.run_id ? r.run_id.slice(0,12)+'…' : '–'}</td>
        <td title="${r.scenario||''}">${r.scenario_group_id ? `<span class="badge badge-blue">${r.scenario_group_id}</span>` : '–'}</td>
        <td>${r.user_id||'–'}</td>
        <td><b>${r.message_count}</b></td>
        <td>${campHtml}</td>
        <td>${estadoBadge}</td>
        <td>${objetivoBadge}</td>
        <td style="color:var(--muted);font-size:11px">${fmtDate(r.started_at)}</td>
      </tr>`;
    }).join('')}
    </tbody></table>`;

  if (pg) {
    const from = start + 1;
    const to   = Math.min(start + CONV_PAGE_SIZE, filtered.length);
    const total = filtered.length;
    const isFiltered = filtered.length !== convList.length;
    const suffix = isFiltered ? ` (de ${convList.length} total)` : '';
    pg.innerHTML = `
      <span style="font-size:12px;color:var(--muted)">${from}–${to} de ${total}${suffix}</span>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn btn-ghost" style="padding:4px 10px" onclick="convGoPage(1)" ${convPage===1?'disabled':''}>«</button>
        <button class="btn btn-ghost" style="padding:4px 10px" onclick="convGoPage(${convPage-1})" ${convPage===1?'disabled':''}>‹</button>
        ${pageButtons(convPage, totalPages)}
        <button class="btn btn-ghost" style="padding:4px 10px" onclick="convGoPage(${convPage+1})" ${convPage===totalPages?'disabled':''}>›</button>
        <button class="btn btn-ghost" style="padding:4px 10px" onclick="convGoPage(${totalPages})" ${convPage===totalPages?'disabled':''}>»</button>
      </div>`;
  }
}

function pageButtons(current, total) {
  const delta = 2;
  const pages = [];
  for (let i = Math.max(1, current - delta); i <= Math.min(total, current + delta); i++) pages.push(i);
  return pages.map(p => `
    <button class="btn ${p===current?'btn-primary':'btn-ghost'}" style="padding:4px 10px;min-width:32px"
      onclick="convGoPage(${p})">${p}</button>`).join('');
}

function convGoPage(p) {
  convPage = Math.max(1, p);
  renderConvPage();
}

function openConvDetail(sid) {
  currentConvId = sid;
  clearInterval(pollTimer);
  renderConvDetail(document.getElementById('content'), sid);
}

async function renderConvDetail(c, sid) {
  c.innerHTML = `
    <button class="btn btn-ghost back-btn" onclick="backToConvList()">← Volver</button>
    <div class="conv-detail" id="conv-detail-wrap">${loading('Cargando conversación…')}</div>`;
  await loadConvDetail(sid);
  pollTimer = setInterval(() => loadConvDetail(sid), 4000);
}

// Persistent state for case panel across polls
let _casePromptExpanded = false;
let _caseExtrasVisible  = false;

function toggleCasePrompt() {
  _casePromptExpanded = !_casePromptExpanded;
  const t = document.getElementById('case-prompt-text');
  const b = document.getElementById('case-prompt-toggle');
  if (!t || !b) return;
  t.classList.toggle('expanded', _casePromptExpanded);
  b.textContent = _casePromptExpanded ? 'Ver menos' : 'Ver más';
}

function toggleCaseExtras() {
  _caseExtrasVisible = !_caseExtrasVisible;
  const e = document.getElementById('case-extras');
  const b = document.getElementById('case-extras-toggle');
  if (!e || !b) return;
  e.classList.toggle('visible', _caseExtrasVisible);
  b.textContent = _caseExtrasVisible ? 'Ocultar detalles' : 'Ver todos los campos';
}

function _buildCasePanel(caseData) {
  if (!caseData) return '';
  const p = caseData.payload || {};

  // -- Guaranteed fields --
  const userName   = p.user_name || p.user_id || '';
  const promptTxt  = p.prompt || '';
  const analysisTxt= p.analysisPrompt || '';
  const campaigns  = Array.isArray(p.campaigns) ? p.campaigns : [];

  // Campaign chips
  const campChips = campaigns.map(c =>
    `<span class="case-camp-chip" title="${escHtml(c.whatsapp_template_name||'')}">
      ${escHtml(c.campaign_name || c.campaign_id || '?')}
    </span>`
  ).join('');

  // -- Extra fields (everything else) --
  const SKIP = new Set(['user_name','prompt','analysisPrompt','campaigns','user_id']);
  const extras = Object.entries(p).filter(([k]) => !SKIP.has(k));
  const extraRows = extras.map(([k, v]) => {
    const val = typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v);

// Store raw_response data indexed by turn for the modal
const _rawStore = {};

// Cache last-loaded conversation data so copyConversation() can access it
let _currentConvData = null;

function copyConversation(sid) {
  if (!_currentConvData) return;
  const msgs = _currentConvData.messages || [];
  const insight = _currentConvData.insight;
  const meta = msgs[0] || {};

  const casePayload = _currentConvData.case?.payload || null;

  const lines = [];
  lines.push('='.repeat(60));
  lines.push(`Conversación: ${sid}`);
  if (meta.run_id)             lines.push(`Run ID:        ${meta.run_id}`);
  if (meta.user_id)            lines.push(`Usuario:       ${meta.user_id}`);
  if (meta.scenario_group_id)  lines.push(`Grupo:         ${meta.scenario_group_id}`);
  if (meta.scenario)           lines.push(`Escenario:     ${meta.scenario}`);
  lines.push(`Mensajes:      ${msgs.length}`);
  if (casePayload) {
    lines.push('');
    lines.push('--- Case ---');
    Object.entries(casePayload).forEach(([k, v]) => {
      lines.push(`${k}: ${typeof v === 'object' ? JSON.stringify(v) : v}`);
    });
  }
  lines.push('='.repeat(60));
  lines.push('');

  msgs.forEach((m, i) => {
    const n = i + 1;
    const camps = (() => {
      try {
        const c = m.campaigns;
        const arr = Array.isArray(c) ? c : (typeof c === 'string' ? JSON.parse(c) : []);
        return arr;
      } catch { return []; }
    })();
    if (camps.length) {
      const names = camps.map(c => c.campaign_name || c.campaign_id || '?').join(', ');
      lines.push(`[Campaña: ${names}]`);
    }
    lines.push(`[${n}] QA : ${m.message || ''}`);
    lines.push(`[${n}] BOT: ${m.response || ''}`);
    lines.push('');
  });

  if (insight) {
    lines.push('-'.repeat(60));
    const status = insight.complete === 1 ? 'Objetivo cumplido' : insight.complete === 0 ? 'Objetivo no cumplido' : 'Sin evaluar';
    lines.push(`Análisis (${status}):`);
    lines.push(insight.analysis || '(sin texto)');
    lines.push('-'.repeat(60));
  }

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`[onclick="copyConversation('${sid}')"]`);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copiado!';
      btn.disabled = true;
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    }
  }).catch(err => console.error('Clipboard error:', err));
}

function msgBubble(m, idx) {
  const n = idx + 1;
  const rawKey = `raw_${n}`;

  if (m.raw_response !== undefined && m.raw_response !== null) {
    _rawStore[rawKey] = m.raw_response;
  }

  const hasRaw = _rawStore[rawKey] != null;
  const turnNumEl = `<span class="tl-turn-num" title="Turno ${n}${hasRaw ? ' · click para ver raw_response' : ''}"
    ${hasRaw ? `onclick="openRawModal(${n})"` : ''}>${n}</span>`;

  // ── media ──
  const images   = parseJsonField(m.images);
  const files    = parseJsonField(m.files);
  const mediaHtml = renderMedia(images, files);

  // ── campaign trigger banner ──
  const msgCamps = (() => {
    try {
      const c = m.campaigns;
      if (!c) return [];
      return Array.isArray(c) ? c : JSON.parse(c);
    } catch { return []; }
  })();
  const campaignBanner = msgCamps.length ? `
    <div class="tl-campaign">
      [Campaña]
      ${msgCamps.map(c => `<span title="ID: ${escHtml(c.campaign_id||'')} | Template: ${escHtml(c.whatsapp_template_name||'')}">${escHtml(c.campaign_name || c.campaign_id || '?')}</span>`).join(', ')}
      <span class="tl-campaign-label">— el usuario responde a este mensaje de campaña</span>
    </div>` : '';

  const userRow = m.message ? `
    <div class="tl-row user">
      <div class="tl-who user">Usuario <span class="tl-time">${fmtDate(m.created_at)}</span></div>
      <div class="tl-text">${escHtml(m.message)}</div>
      ${mediaHtml ? `<div class="tl-media">${mediaHtml}</div>` : ''}
    </div>` : '';

  const botRow = m.response ? `
    <div class="tl-row bot">
      <div class="tl-who bot">Bot <span class="tl-time">${fmtDate(m.updated_at || m.created_at)}</span></div>
      <div class="tl-text">${escHtml(m.response)}</div>
    </div>` : '';

  return `<div class="tl-turn">
    ${turnNumEl}
    ${campaignBanner}${userRow}${botRow}
  </div>`;
}

function parseJsonField(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  try { return JSON.parse(val) || []; } catch { return []; }
}

function renderMedia(images, files) {
  let html = '';

  for (const img of images) {
    const url = typeof img === 'string' ? img : (img.url || img.src || '');
    if (!url) continue;
    const ext = url.split('?')[0].split('.').pop().toLowerCase();
    if (ext === 'pdf') {
      html += fileChip(url, '📄', url.split('/').pop() || 'documento.pdf');
    } else {
      html += `<img class="tl-thumb" src="${escAttr(url)}" alt="imagen"
                    onclick="openLb('${escAttr(url)}','imagen')"
                    onerror="this.style.display='none'"/>`;
    }
  }

  for (const f of files) {
    const url  = typeof f === 'string' ? f : (f.url || f.path || f.src || '');
    const name = typeof f === 'string' ? url.split('/').pop() : (f.name || f.filename || url.split('/').pop() || 'archivo');
    if (!url) continue;
    const ext  = url.split('?')[0].split('.').pop().toLowerCase();
    const icon = ext === 'pdf' ? '📄' : ['jpg','jpeg','png','gif','webp'].includes(ext) ? '🖼' : '📎';
    if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
      html += `<img class="tl-thumb" src="${escAttr(url)}" alt="${escHtml(name)}"
                    onclick="openLb('${escAttr(url)}','${escAttr(name)}')"
                    onerror="this.style.display='none'"/>`;
    } else {
      html += fileChip(url, icon, name);
    }
  }

  return html;
}

function fileChip(url, icon, name) {
  const ext = url.split('?')[0].split('.').pop().toLowerCase();
  const handler = ext === 'pdf'
    ? `onclick="openLb('${escAttr(url)}','${escAttr(name)}');return false;"`
    : `target="_blank"`;
  return `<a href="${escAttr(url)}" class="tl-file" ${handler}>
    <span class="tl-file-icon">${icon}</span>${escHtml(name.length > 30 ? name.slice(0,27)+'…' : name)}
  </a>`;
}

function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLb(url, caption) {
  const ext = url.split('?')[0].split('.').pop().toLowerCase();
  const isPdf = ext === 'pdf';
  document.getElementById('lbCaption').textContent   = caption || '';
  document.getElementById('lbDownload').href         = url;
  document.getElementById('lbImg').classList.toggle('hidden', isPdf);
  document.getElementById('lbPdf').classList.toggle('hidden', !isPdf);
  if (isPdf) {
    document.getElementById('lbPdf').src = url;
  } else {
    document.getElementById('lbImg').src = url;
  }
  document.getElementById('lbModal').classList.remove('hidden');
}

function closeLb(e) {
  if (e && e.target !== document.getElementById('lbModal')) return;
  document.getElementById('lbModal').classList.add('hidden');
  document.getElementById('lbImg').src = '';
  document.getElementById('lbPdf').src = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLb();
    closeRawModal();
  }
});

function openRawModal(n) {
  const raw = _rawStore[`raw_${n}`];
  if (raw == null) return;
  let text;
  try {
    const obj = typeof raw === 'string' ? JSON.parse(raw) : raw;
    text = JSON.stringify(obj, null, 2);
  } catch {
    text = String(raw);
  }
  document.getElementById('rawModalTitle').textContent = `Turno ${n} — raw_response`;
  document.getElementById('rawModalContent').textContent = text;
  document.getElementById('rawModal').classList.remove('hidden');
}

function closeRawModal() {
  document.getElementById('rawModal').classList.add('hidden');
}
document.getElementById('rawModal').addEventListener('click', e => {
  if (e.target === document.getElementById('rawModal')) closeRawModal();
});

let _chartDonut = null;

function _destroyCharts() {

// ── SVG Charts (DEAD CODE — kept as fallback marker) ──────────────────────────

function svgDonut(ok, fail, pend, size = 130) {
  const total = ok + fail + pend || 1;
  const r = 44, cx = size / 2, cy = size / 2, sw = 20;
  const circ = 2 * Math.PI * r;
  const segs = [{v:ok,c:'#4ade80'},{v:fail,c:'#f87171'},{v:pend,c:'#fbbf24'}];
  let offset = 0;
  const arcs = segs.map(({v, c}) => {
    const len = (v / total) * circ;
    const arc = v > 0
      ? `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="${sw}"
           stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}"
           stroke-dashoffset="${(-offset).toFixed(2)}"
           transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`
      : '';
    offset += len;
    return arc;
  });
  const pct = total === 1 && ok === 0 ? '–' : Math.round(ok / total * 100) + '%';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
    ${arcs.join('')}
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" dominant-baseline="middle"
      fill="var(--text)" font-size="17" font-weight="700" font-family="inherit">${pct}</text>
    <text x="${cx}" y="${cy + 13}" text-anchor="middle" dominant-baseline="middle"
      fill="var(--muted)" font-size="9" font-family="inherit">cumplido</text>
  </svg>`;
}

function svgGroupBars(groups) {
  if (!groups.length) return '<div style="color:var(--muted);font-size:12px;padding:20px">Sin grupos</div>';
  const W = Math.max(260, groups.length * 52 + 20);
  const H = 110, padB = 28, padT = 8, padL = 4;
  const maxVal = Math.max(...groups.map(g => g.ok + g.fail + g.pend), 1);
  const barW = Math.min(36, Math.floor((W - padL * 2) / groups.length) - 6);
  const chartH = H - padB - padT;

  const bars = groups.map((g, i) => {
    const x = padL + i * (barW + 6);
    const okH   = Math.round((g.ok   / maxVal) * chartH);
    const failH = Math.round((g.fail / maxVal) * chartH);
    const pendH = Math.round((g.pend / maxVal) * chartH);
    const total = okH + failH + pendH;
    const baseY = H - padB;
    const lbl = g.id.length > 7 ? g.id.slice(0, 6) + '…' : g.id;
    return `
      ${pendH > 0 ? `<rect x="${x}" y="${baseY - total}" width="${barW}" height="${pendH}" fill="#fbbf24" rx="2 2 0 0"/>` : ''}
      ${failH > 0 ? `<rect x="${x}" y="${baseY - total + pendH}" width="${barW}" height="${failH}" fill="#f87171"/>` : ''}
      ${okH   > 0 ? `<rect x="${x}" y="${baseY - okH}" width="${barW}" height="${okH}" fill="#4ade80" rx="0 0 2 2"/>` : ''}
      <text x="${x + barW / 2}" y="${H - padB + 14}" text-anchor="middle"
        fill="var(--muted)" font-size="8" font-family="inherit">${escHtml(lbl)}</text>
      <text x="${x + barW / 2}" y="${baseY - total - 4}" text-anchor="middle"
        fill="var(--muted)" font-size="8" font-family="inherit">${g.ok + g.fail + g.pend}</text>
    `;
  });

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">${bars.join('')}</svg>`;
}

function _applyAnalysisFilters(list) {
  return list.filter(a => {
    if (analysisFilterStatus === 'ok'      && a.complete !== 1) return false;
    if (analysisFilterStatus === 'fail'    && a.complete !== 0) return false;
    if (analysisFilterStatus === 'pending' && (a.complete === 1 || a.complete === 0)) return false;
    if (analysisFilterGroup && (a.scenario_group_id||'') !== analysisFilterGroup) return false;
    if (analysisFilterCampaign) {
      const camps = (() => { try { const c = a.campaigns; return Array.isArray(c)?c:(c?JSON.parse(c):[]); } catch { return []; } })();
      if (!camps.some(c => (c.campaign_name||c.campaign_id||'') === analysisFilterCampaign)) return false;
    }
    if (analysisSearchQuery) {
      const q = analysisSearchQuery.toLowerCase();
      return (a.analysis||'').toLowerCase().includes(q) ||
             (a.scenario||'').toLowerCase().includes(q) ||
             (a.scenario_group_id||'').toLowerCase().includes(q) ||
             (a.user_id||'').toLowerCase().includes(q) ||
             (a.session_id||'').toLowerCase().includes(q);
    }
    return true;
  });
}

function setAnalysisFilter(type, val) {
  if (type === 'status')   analysisFilterStatus   = val;
  if (type === 'group')    analysisFilterGroup    = val;
  if (type === 'campaign') analysisFilterCampaign = val;
  analysisPage = 1;
  _renderAnalysisList();
}

function analysisSearch() {
  analysisSearchQuery = document.getElementById('analysis-search-q')?.value || '';
  analysisPage = 1;
  _renderAnalysisList();
}

function clearAnalysisSearch() {
  analysisSearchQuery = '';

  analysisPage = 1;
  _renderAnalysisList();
}

function setAnalysisPage(p) {
