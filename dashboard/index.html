}

// ── Stats + Chart.js charts (only re-rendered on data reload) ─────────────────

function _renderAnalysisStats() {
  const top = document.getElementById('an-top');
  if (!top) return;

  const total   = analysesList.length;
  const ok      = analysesList.filter(a => a.complete === 1).length;
  const fail    = analysesList.filter(a => a.complete === 0).length;
  const pending = total - ok - fail;
  const pctOk   = total ? Math.round(ok / total * 100) : 0;

  // Group aggregation
  const groupMap = {};
  analysesList.forEach(a => {
    const g = a.scenario_group_id || '(sin grupo)';
    if (!groupMap[g]) groupMap[g] = {id:g, ok:0, fail:0, pend:0};
    if (a.complete === 1)      groupMap[g].ok++;
    else if (a.complete === 0) groupMap[g].fail++;
    else                       groupMap[g].pend++;
  });
  const groups = Object.values(groupMap).sort((a,b)=>(b.ok+b.fail+b.pend)-(a.ok+a.fail+a.pend));

  // Timeline (group by day)
  const dateMap = {};
  analysesList.forEach(a => {
    const d = (a.created_at||'').slice(0,10);
    if (!d) return;
    if (!dateMap[d]) dateMap[d] = {ok:0, fail:0, pend:0};
    if (a.complete === 1)      dateMap[d].ok++;
    else if (a.complete === 0) dateMap[d].fail++;
    else                       dateMap[d].pend++;
  });
  const dates = Object.keys(dateMap).sort();
  const hasTimeline = dates.length > 1;

  _destroyCharts();

  top.innerHTML = `
    <div class="an-summary">
      <div class="an-stat">
        <span class="an-stat-lbl">Total analizados</span>
        <span class="an-stat-val" style="color:var(--accent)">${total}</span>
      </div>
      <div class="an-stat ok">
        <span class="an-stat-lbl">Tasa de éxito</span>
        <span class="an-stat-val">${pctOk}%</span>
      </div>
      <div class="an-stat ok">
        <span class="an-stat-lbl">Cumplidos</span>
        <span class="an-stat-val">${ok}</span>
        <span class="an-stat-sub">${total?Math.round(ok/total*100):0}% del total</span>
      </div>
      <div class="an-stat fail">
        <span class="an-stat-lbl">Fallidos</span>
        <span class="an-stat-val">${fail}</span>
        <span class="an-stat-sub">${total?Math.round(fail/total*100):0}% del total</span>
      </div>
      <div class="an-stat pend">
        <span class="an-stat-lbl">Sin evaluar</span>
        <span class="an-stat-val">${pending}</span>
        <span class="an-stat-sub">${total?Math.round(pending/total*100):0}% del total</span>
      </div>
    </div>
    ${total > 0 ? `
    <div class="an-charts-row">
      <div class="an-chart-box" style="max-width:300px;min-width:220px">
        <div class="an-chart-title">Distribución general</div>
        <div style="position:relative;height:200px"><canvas id="chart-donut"></canvas></div>
      </div>
      ${groups.length >= 1 ? `
      <div class="an-chart-box wide" style="overflow-x:auto">
        <div class="an-chart-title">Resultados por grupo</div>
        <div style="position:relative;height:200px;min-width:${Math.max(260,groups.length*72)}px">
          <canvas id="chart-bars"></canvas>
        </div>
      </div>` : ''}
    </div>
    ${hasTimeline ? `
    <div class="an-chart-box" style="margin-bottom:12px">
      <div class="an-chart-title">Evolución temporal</div>
      <div style="position:relative;height:160px"><canvas id="chart-line"></canvas></div>
    </div>` : ''}` : ''}
  `;

  if (!total || typeof Chart === 'undefined') return;

  Chart.defaults.color       = '#7c85a2';
  Chart.defaults.borderColor = '#2e3250';
  Chart.defaults.font.family = "'Segoe UI',system-ui,sans-serif";
  Chart.defaults.font.size   = 11;

  const C = {
    ok:   {bg:'rgba(74,222,128,.82)',  b:'#4ade80'},
    fail: {bg:'rgba(248,113,113,.82)', b:'#f87171'},
    pend: {bg:'rgba(251,191,36,.82)',  b:'#fbbf24'},
  };

  // Doughnut
  const ctxD = document.getElementById('chart-donut')?.getContext('2d');
  if (ctxD) {
    _chartDonut = new Chart(ctxD, {
      type: 'doughnut',
      data: {
        labels: ['Cumplidos','Fallidos','Sin evaluar'],
        datasets: [{
          data: [ok, fail, pending],
          backgroundColor: [C.ok.bg, C.fail.bg, C.pend.bg],
          borderColor:     [C.ok.b,  C.fail.b,  C.pend.b],
          borderWidth: 1.5, hoverOffset: 10,
        }],
      },
      options: {
        responsive:true, maintainAspectRatio:false, cutout:'68%',
        plugins: {
          legend: {position:'right', labels:{padding:14, usePointStyle:true, pointStyleWidth:9}},
          tooltip: {callbacks:{label: ctx => ` ${ctx.label}: ${ctx.raw} (${total?Math.round(ctx.raw/total*100):0}%)`}},
        },
      },
    });
  }

  // Stacked bar by group
  const ctxB = document.getElementById('chart-bars')?.getContext('2d');
  if (ctxB && groups.length) {
    _chartBars = new Chart(ctxB, {
      type: 'bar',
      data: {
        labels: groups.map(g=>g.id),
        datasets: [
          {label:'Cumplidos',   data:groups.map(g=>g.ok),   backgroundColor:C.ok.bg,   borderColor:C.ok.b,   borderWidth:1},
          {label:'Fallidos',    data:groups.map(g=>g.fail), backgroundColor:C.fail.bg, borderColor:C.fail.b, borderWidth:1},
          {label:'Sin evaluar', data:groups.map(g=>g.pend), backgroundColor:C.pend.bg, borderColor:C.pend.b, borderWidth:1},
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales: {
          x: {stacked:true, grid:{color:'#2e3250'}, ticks:{maxRotation:35, font:{size:10}}},
          y: {stacked:true, grid:{color:'#2e3250'}, beginAtZero:true, ticks:{stepSize:1}},
        },
        plugins: {
          legend:  {position:'top', labels:{usePointStyle:true, padding:12}},
          tooltip: {mode:'index', intersect:false},
        },
      },
    });
  }

  // Line chart — timeline
  const ctxL = document.getElementById('chart-line')?.getContext('2d');
  if (ctxL && hasTimeline) {
    _chartLine = new Chart(ctxL, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          {label:'Cumplidos',   data:dates.map(d=>dateMap[d].ok),   borderColor:C.ok.b,   backgroundColor:'rgba(74,222,128,.08)',  tension:.35, fill:true, pointRadius:3, borderWidth:2},
          {label:'Fallidos',    data:dates.map(d=>dateMap[d].fail), borderColor:C.fail.b, backgroundColor:'rgba(248,113,113,.08)', tension:.35, fill:true, pointRadius:3, borderWidth:2},
          {label:'Sin evaluar', data:dates.map(d=>dateMap[d].pend), borderColor:C.pend.b, backgroundColor:'rgba(251,191,36,.08)',  tension:.35, fill:true, pointRadius:3, borderWidth:2},
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index', intersect:false},
        scales: {
          x: {grid:{color:'#2e3250'}, ticks:{font:{size:10}}},
          y: {grid:{color:'#2e3250'}, beginAtZero:true, ticks:{stepSize:1}},
        },
        plugins: {legend:{position:'top', labels:{usePointStyle:true, padding:12}}},
      },
    });
  }
}

// ── Filtered + paginated list ─────────────────────────────────────────────────

function _renderAnalysisList() {
  const listEl = document.getElementById('an-list');
  if (!listEl) return;

  const total    = analysesList.length;
  const filtered = _applyAnalysisFilters(analysesList);
  const pageCount = Math.max(1, Math.ceil(filtered.length / AN_PAGE_SIZE));
  if (analysisPage > pageCount) analysisPage = pageCount;
  const pageItems = filtered.slice((analysisPage-1)*AN_PAGE_SIZE, analysisPage*AN_PAGE_SIZE);

  const ok      = analysesList.filter(a => a.complete === 1).length;
  const fail    = analysesList.filter(a => a.complete === 0).length;
  const pending = total - ok - fail;

  const allGroups = [...new Set(analysesList.map(a=>a.scenario_group_id).filter(Boolean))].sort();
  const allCamps  = [...new Set(analysesList.flatMap(a=>{
    try{const c=a.campaigns;const arr=Array.isArray(c)?c:(c?JSON.parse(c):[]);return arr.map(x=>x.campaign_name||x.campaign_id||'');}
    catch{return [];}
  }).filter(Boolean))].sort();

  const statusBtns = [
    {k:'all',    lbl:`Todos (${total})`,         cls:'all'},
    {k:'ok',     lbl:`Cumplidos (${ok})`,        cls:'ok'},
    {k:'fail',   lbl:`Fallidos (${fail})`,       cls:'fail'},
    {k:'pending',lbl:`Sin evaluar (${pending})`, cls:'pend'},
  ].map(b=>`<button class="an-filter-btn${analysisFilterStatus===b.k?' active '+b.cls:''}"
    onclick="setAnalysisFilter('status','${b.k}')">${b.lbl}</button>`).join('');

  const groupSel = allGroups.length ? `
    <select class="search-select" onchange="setAnalysisFilter('group',this.value)">
      <option value="">Todos los grupos</option>
      ${allGroups.map(g=>`<option value="${escHtml(g)}"${analysisFilterGroup===g?' selected':''}>${escHtml(g)}</option>`).join('')}
    </select>` : '';

  const campSel = allCamps.length ? `
    <select class="search-select" onchange="setAnalysisFilter('campaign',this.value)">
      <option value="">Todas las campañas</option>
      ${allCamps.map(g=>`<option value="${escHtml(g)}"${analysisFilterCampaign===g?' selected':''}>${escHtml(g)}</option>`).join('')}
    </select>` : '';

  function pgHtml() {
    if (pageCount <= 1) return '';
    const prev = `<button class="pg-btn" onclick="setAnalysisPage(${analysisPage-1})"${analysisPage<=1?' disabled':''}>←</button>`;
    const next = `<button class="pg-btn" onclick="setAnalysisPage(${analysisPage+1})"${analysisPage>=pageCount?' disabled':''}>→</button>`;
    const nums = [];
    for (let i = 1; i <= pageCount; i++) {
      if (i===1 || i===pageCount || Math.abs(i-analysisPage)<=2) {
        nums.push(`<button class="pg-btn${i===analysisPage?' active':''}" onclick="setAnalysisPage(${i})">${i}</button>`);
      } else if (nums[nums.length-1] !== '<span class="pg-ellipsis">…</span>') {
        nums.push('<span class="pg-ellipsis">…</span>');
      }
    }
    const s = (analysisPage-1)*AN_PAGE_SIZE+1, e = Math.min(analysisPage*AN_PAGE_SIZE, filtered.length);
    return `<div class="an-pagination">${prev}${nums.join('')}${next}<span class="pg-info">${s}–${e} de ${filtered.length}</span></div>`;
  }

  const cardsHtml = !pageItems.length
    ? `<div class="empty-state">Sin resultados para los filtros aplicados</div>`
    : pageItems.map((a, idx) => {
        const aCamps  = (()=>{try{const c=a.campaigns;return Array.isArray(c)?c:(c?JSON.parse(c):[]);}catch{return [];}})();
        const cardCls = a.complete===1?'ok':a.complete===0?'fail':'pending';
        const badge   = a.complete===1
          ? `<span class="chip chip-green">✓ Objetivo cumplido</span>`
          : a.complete===0 ? `<span class="chip chip-red">✗ Objetivo no cumplido</span>`
          : `<span class="chip chip-orange">⏳ Sin evaluar</span>`;
        const eid = `atxt_${idx}`;
        return `
        <div class="analysis-card ${cardCls}">
          <div class="analysis-meta">
            <span style="font-family:monospace;font-size:11px;color:var(--muted)" title="${escHtml(a.session_id||'')}">${(a.session_id||'–').slice(0,18)}…</span>
            ${a.scenario_group_id?`<span class="badge badge-blue">${escHtml(a.scenario_group_id)}</span>`:''}
            ${a.scenario?`<span class="tag" title="${escHtml(a.scenario)}">${a.scenario.length>44?a.scenario.slice(0,42)+'…':escHtml(a.scenario)}</span>`:''}
            ${a.user_id?`<span class="tag">👤 ${escHtml(a.user_id)}</span>`:''}
            ${a.message_count?`<span class="tag">💬 ${a.message_count}</span>`:''}
            ${aCamps.map(c=>`<span class="tag" style="color:var(--accent2);border-color:rgba(0,212,170,.3)">📣 ${escHtml(c.campaign_name||c.campaign_id||'–')}</span>`).join('')}
            <span style="margin-left:auto;font-size:11px;color:var(--muted)">${fmtDate(a.created_at)}</span>
          </div>
          ${badge}
          <div class="analysis-text" id="${eid}" style="margin-top:10px">${escHtml(a.analysis||'(sin análisis)')}</div>
          <div class="analysis-actions">
            <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px"
              onclick="toggleAnalysisExpand('${eid}',this)">▼ Expandir</button>
            <button class="btn btn-primary" style="font-size:11px;padding:4px 12px"
              onclick="openConvFromAnalysis('${escHtml(a.session_id||'')}')">↗ Ver conversación</button>
            <span style="margin-left:auto;font-family:monospace;font-size:10px;color:var(--muted)"
                  title="${escHtml(a.run_id||'')}">run: ${(a.run_id||'–').slice(0,12)}…</span>
          </div>
        </div>`;
      }).join('');

  listEl.innerHTML = `
    <div class="an-filter-bar">
      <div class="an-filter-group">${statusBtns}</div>
      ${groupSel}${campSel}
      <input class="search-input" style="flex:1;min-width:140px" id="analysis-search-q" type="text"
             placeholder="Buscar en análisis, escenario, usuario…" oninput="analysisSearch()" value="${escHtml(analysisSearchQuery)}"/>
      ${analysisSearchQuery?`<button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="clearAnalysisSearch()">✕</button>`:''}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0 4px;flex-wrap:wrap;gap:6px">
      <span style="font-size:12px;color:var(--muted)">${filtered.length} resultado${filtered.length!==1?'s':''}${filtered.length!==total?` de ${total} totales`:''}</span>
      ${pgHtml()}
    </div>
    ${cardsHtml}
    ${pageCount>1?`<div style="display:flex;justify-content:flex-end;margin-top:14px">${pgHtml()}</div>`:''}
  `;
}

function toggleAnalysisExpand(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '▲ Colapsar' : '▼ Expandir';
}

function openConvFromAnalysis(sid) {
  currentConvId = sid;
  showPage('conversations', document.querySelector('[data-page="conversations"]'));
}

// ── Executive Report ─────────────────────────────────────────────────────────

function openReportModal() {
  const total   = analysesList.length;
  if (!total) { alert('Sin datos para generar reporte.'); return; }
  const ok      = analysesList.filter(a => a.complete === 1).length;
  const fail    = analysesList.filter(a => a.complete === 0).length;
  const pending = total - ok - fail;
  const pctOk   = Math.round(ok / total * 100);

  // Group breakdown
  const groupMap = {};
  analysesList.forEach(a => {
    const g = a.scenario_group_id || '(sin grupo)';
    if (!groupMap[g]) groupMap[g] = {id:g, ok:0, fail:0, pend:0};
    if (a.complete === 1)      groupMap[g].ok++;
    else if (a.complete === 0) groupMap[g].fail++;
    else                       groupMap[g].pend++;
  });
  const groups = Object.values(groupMap).sort((a, b) => (b.ok+b.fail+b.pend) - (a.ok+a.fail+a.pend));

  // Failed cases (latest 20)
  const failedCases = analysesList
    .filter(a => a.complete === 0)
    .slice(0, 20);

  // Campaign breakdown
  const campMap = {};
  analysesList.forEach(a => {
    const camps = (() => { try { const c = a.campaigns; return Array.isArray(c)?c:(c?JSON.parse(c):[]); } catch { return []; } })();
    camps.forEach(c => {
      const k = c.campaign_name || c.campaign_id || '?';
      if (!campMap[k]) campMap[k] = {name:k, ok:0, fail:0, total:0};
      campMap[k].total++;
      if (a.complete === 1) campMap[k].ok++;
      else if (a.complete === 0) campMap[k].fail++;
    });
  });
  const camps = Object.values(campMap).sort((a, b) => b.total - a.total);

  const now = new Date().toLocaleDateString('es-MX', {year:'numeric',month:'long',day:'numeric'});

  const groupRows = groups.map(g => {
    const t = g.ok + g.fail + g.pend;
    const p = Math.round(g.ok / t * 100);
    return `<tr>
      <td>${escHtml(g.id)}</td>
      <td style="text-align:center">${t}</td>
      <td style="text-align:center;color:#4ade80">${g.ok} (${p}%)</td>
      <td style="text-align:center;color:#f87171">${g.fail}</td>
      <td style="text-align:center;color:#fbbf24">${g.pend}</td>
    </tr>`;
  }).join('');

  const campRows = camps.map(c => {
    const p = Math.round(c.ok / c.total * 100);
    return `<tr>
      <td>${escHtml(c.name)}</td>
      <td style="text-align:center">${c.total}</td>
      <td style="text-align:center;color:#4ade80">${c.ok} (${p}%)</td>
      <td style="text-align:center;color:#f87171">${c.fail}</td>
    </tr>`;
  }).join('');

  const failItems = failedCases.map(a => `
    <div class="report-fail-item">
      <div class="report-fail-meta">
        ${a.scenario_group_id ? `<span class="badge badge-blue">${escHtml(a.scenario_group_id)}</span>` : ''}
        ${a.scenario ? `<span class="tag">${escHtml(a.scenario.length>50?a.scenario.slice(0,48)+'…':a.scenario)}</span>` : ''}
        ${a.user_id ? `<span class="tag" style="color:var(--muted)">👤 ${escHtml(a.user_id)}</span>` : ''}
        <span style="margin-left:auto;font-size:10px;color:var(--muted)">${fmtDate(a.created_at)}</span>
      </div>
      <div class="report-fail-text">${escHtml((a.analysis||'(sin análisis)').slice(0, 400))}${(a.analysis||'').length>400?'…':''}</div>
    </div>`).join('');

  const html = `
    <div class="report-overlay" id="report-overlay" onclick="if(event.target===this)closeReportModal()">
      <div class="report-box">
        <div class="report-head">
          <div>
            <h3>Reporte Ejecutivo QA</h3>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${now}</div>
          </div>
          <div class="report-head-actions">
            <button class="btn btn-ghost" style="font-size:12px" onclick="copyReport()">Copiar texto</button>
            <button class="btn btn-ghost" style="font-size:12px" onclick="downloadReport()">Descargar .txt</button>
            <button class="btn btn-danger" style="font-size:12px" onclick="closeReportModal()">✕ Cerrar</button>
          </div>
        </div>
        <div class="report-body">

          <div class="report-section">
            <h4>Resumen general</h4>
            <div class="report-kpi-row">
              <div class="report-kpi"><div class="rk-val" style="color:var(--accent)">${total}</div><div class="rk-lbl">Analizados</div></div>
              <div class="report-kpi ok"><div class="rk-val">${pctOk}%</div><div class="rk-lbl">Tasa de éxito</div></div>
              <div class="report-kpi ok"><div class="rk-val">${ok}</div><div class="rk-lbl">Cumplidos</div></div>
              <div class="report-kpi fail"><div class="rk-val">${fail}</div><div class="rk-lbl">Fallidos</div></div>
            </div>
            <div style="margin-top:8px;font-size:12px;color:var(--muted)">
              ${pending} conversaciones sin evaluar (${Math.round(pending/total*100)}%)
            </div>
          </div>

          ${groups.length > 0 ? `
          <div class="report-section">
            <h4>Resultados por grupo</h4>
            <table class="report-table">
              <thead><tr><th>Grupo</th><th>Total</th><th>Cumplidos</th><th>Fallidos</th><th>Sin eval.</th></tr></thead>
              <tbody>${groupRows}</tbody>
            </table>
          </div>` : ''}

          ${camps.length > 0 ? `
          <div class="report-section">
            <h4>Resultados por campaña</h4>
            <table class="report-table">
              <thead><tr><th>Campaña</th><th>Total</th><th>Cumplidos</th><th>Fallidos</th></tr></thead>
              <tbody>${campRows}</tbody>
            </table>
          </div>` : ''}

          ${failedCases.length > 0 ? `
          <div class="report-section">
            <h4>Casos fallidos${failedCases.length < fail ? ` (mostrando ${failedCases.length} de ${fail})` : ''}</h4>
            ${failItems}
          </div>` : ''}

        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function closeReportModal() {
  document.getElementById('report-overlay')?.remove();
}

function _reportText() {
  const total   = analysesList.length;
  const ok      = analysesList.filter(a => a.complete === 1).length;
  const fail    = analysesList.filter(a => a.complete === 0).length;
  const pending = total - ok - fail;
  const pctOk   = total ? Math.round(ok / total * 100) : 0;
  const now     = new Date().toLocaleDateString('es-MX', {year:'numeric',month:'long',day:'numeric'});

  const groupMap = {};
  analysesList.forEach(a => {
    const g = a.scenario_group_id || '(sin grupo)';
    if (!groupMap[g]) groupMap[g] = {id:g, ok:0, fail:0, pend:0};
    if (a.complete === 1) groupMap[g].ok++; else if (a.complete === 0) groupMap[g].fail++; else groupMap[g].pend++;
  });

  const lines = [
    'REPORTE EJECUTIVO QA',
    `Fecha: ${now}`,
    '='.repeat(60),
    '',
    'RESUMEN GENERAL',
    `  Total analizados : ${total}`,
    `  Tasa de éxito    : ${pctOk}%`,
    `  Cumplidos        : ${ok}`,
    `  Fallidos         : ${fail}`,
    `  Sin evaluar      : ${pending}`,
    '',
    'RESULTADOS POR GRUPO',
    '  Grupo                  Total  Cumplido  Fallido  Sin eval.',
    '  ' + '-'.repeat(58),
    ...Object.values(groupMap).map(g => {
      const t = g.ok + g.fail + g.pend;
      return `  ${g.id.padEnd(22)} ${String(t).padEnd(6)} ${String(g.ok).padEnd(9)} ${String(g.fail).padEnd(8)} ${g.pend}`;
    }),
    '',
    'CASOS FALLIDOS',
    ...analysesList.filter(a => a.complete === 0).slice(0, 20).map(a =>
      `\n  [${a.session_id?.slice(0,16)||'?'}] ${a.scenario_group_id||''} | ${a.scenario||''}\n  ${(a.analysis||'').slice(0,300)}`
    ),
  ];
  return lines.join('\n');
}

function copyReport() {
  navigator.clipboard.writeText(_reportText()).then(() => {
    const btn = document.querySelector('#report-overlay .report-head-actions .btn-ghost');
    if (btn) { const t = btn.textContent; btn.textContent = '¡Copiado!'; setTimeout(() => btn.textContent = t, 2000); }
  });
}

function downloadReport() {
  const blob = new Blob([_reportText()], {type: 'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `reporte-qa-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── CASES ──────────────────────────────────────────────────────────────────────
async function renderCases(c) {
  c.innerHTML = `
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <button class="btn btn-ghost" onclick="formatCases()">{ } Formatear</button>
        <button class="btn btn-success" onclick="saveCases()">💾 Guardar</button>
        <span class="editor-status" id="cases-status"></span>
      </div>
      <div id="cases-spinner" style="position:relative">${loading('Cargando cases.json…')}</div>
      <textarea class="code hidden" id="cases-editor" spellcheck="false"></textarea>
    </div>`;
  const data = await api('GET', '/api/cases');
  document.getElementById('cases-spinner')?.remove();
  const ta = document.getElementById('cases-editor');
  if (ta) {
    ta.classList.remove('hidden');
    try { ta.value = JSON.stringify(JSON.parse(data.content), null, 2); }
    catch { ta.value = data.content || '[]'; }
  }
}

function formatCases() {
  const ta = document.getElementById('cases-editor');
  if (!ta) return;
  try {
    ta.value = JSON.stringify(JSON.parse(ta.value), null, 2);
    setStatus('cases-status', '✓ Formateado', 'var(--green)');
  } catch(e) {
    setStatus('cases-status', '✗ JSON inválido: ' + e.message, 'var(--red)');
  }
}

async function saveCases() {
  const ta = document.getElementById('cases-editor');
  if (!ta) return;
  try {
    JSON.parse(ta.value); // validate
  } catch(e) {
    setStatus('cases-status', '✗ JSON inválido', 'var(--red)');
    return;
  }
  const res = await api('PUT', '/api/cases', { content: ta.value });
  if (res.ok) setStatus('cases-status', '✓ Guardado', 'var(--green)');
  else setStatus('cases-status', '✗ ' + (res.error||'Error'), 'var(--red)');
}

// ── RUN ──────────────────────────────────────────────────────────────────────

// Lines to always show regardless of filter
const RUN_SHOW_RE = /error|fail|exception|traceback|warning|batch|✓|✗|completado|iniciando|starting|done|finish|listo/i;

let _sseLineCount = 0;

function _updateSseCounter() {
  const el = document.getElementById('run-line-count');
  if (el) el.textContent = `${_sseLineCount} líneas recibidas`;
}

// SSE: connects and receives backlog + live lines. Called on page load and after start.
function openSse() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  _sseLineCount = 0;
  _updateSseCounter();
  sseSource = new EventSource('/api/run/stream');
  sseSource.onmessage = e => {
    if (e.data === 'null') return;
    const line = JSON.parse(e.data);
    _sseLineCount++;
    _updateSseCounter();
    if (RUN_SHOW_RE.test(line)) termLine(line);
  };
  sseSource.addEventListener('done', async () => {
    sseSource.close(); sseSource = null;
    const s = await api('GET', '/api/run/status');
    if (s?.returncode === 0) {
      termLine(`✓ Proceso finalizado OK  (${_sseLineCount} líneas procesadas)`, 'ok');
    } else {
      termLine(`✗ Proceso terminado  rc=${s?.returncode ?? '?'}  (${_sseLineCount} líneas procesadas)`, 'err');
    }
    syncRunStatus();
  });
  sseSource.onerror = () => { sseSource?.close(); sseSource = null; };
}

async function renderRun(c) {
  c.innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div class="card-header" style="padding-bottom:12px">
        Ejecutar
        <span id="run-dot" style="font-size:11px;color:var(--muted);font-weight:400;margin-left:8px">–</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;padding:0 4px 14px">
        <div class="form-group" style="flex:2;min-width:160px">
          <label>Archivo JSON</label>
          <input id="run-json-file" value="cases.json"/>
        </div>
        <div class="form-group" style="flex:1;min-width:100px">
          <label>Batch size</label>
          <input id="run-batch-size" type="number" value="20" min="1"/>
        </div>
        <div class="form-group" style="flex:1;min-width:100px">
          <label>Max workers</label>
          <input id="run-max-workers" type="number" value="10" min="1"/>
        </div>
        <div class="form-group" style="flex:1;min-width:100px">
          <label title="0 = todos">Max items <span style="color:var(--muted);font-weight:400">(0=todos)</span></label>
          <input id="run-max-items" type="number" value="0" min="0"/>
        </div>
      </div>
      <div style="display:flex;gap:10px;padding:0 4px 4px">
        <button class="btn btn-primary" id="run-btn" onclick="startRun()" style="min-width:110px">
          ▶ Ejecutar
        </button>
        <button class="btn btn-danger" id="stop-btn" onclick="stopRun()" disabled style="min-width:110px">
          ■ Detener
        </button>
      </div>
    </div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Output</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="run-line-count" style="font-size:11px;color:var(--muted)"></span>
          <button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="clearTerminal()">Limpiar</button>
        </div>
      </div>
      <div class="terminal" id="terminal" style="flex:1"></div>
    </div>`;

  await syncRunStatus();
  openSse();
  pollTimer = setInterval(syncRunStatus, 4000);
}

// Sync button state + dot indicator from server status
async function syncRunStatus() {
  const s = await api('GET', '/api/run/status');
  if (!s) return;

  const dot = document.getElementById('run-dot');
  if (dot) {
    if (s.running) {
      dot.innerHTML = `<span class="pulse" style="color:var(--green)">●</span> Corriendo · ${s.lines} líneas · iniciado ${fmtDate(s.started_at)}`;
    } else if (s.returncode === 0) {
      dot.innerHTML = `<span style="color:var(--green)">✓</span> Completado OK`;
    } else if (s.returncode !== null) {
      dot.innerHTML = `<span style="color:var(--red)">✗</span> Detenido (rc=${s.returncode})`;
    } else {
      dot.textContent = 'Sin ejecuciones recientes';
    }
  }

  const rb = document.getElementById('run-btn');
  const sb = document.getElementById('stop-btn');
  if (rb) rb.disabled = s.running;
  if (sb) sb.disabled = !s.running;

  if (!s.running && sseSource) { sseSource.close(); sseSource = null; }
}

async function startRun() {
  const jsonFile   = document.getElementById('run-json-file')?.value.trim() || 'cases.json';
  const batchSize  = parseInt(document.getElementById('run-batch-size')?.value || '20');
  const maxWorkers = parseInt(document.getElementById('run-max-workers')?.value || '10');
  const maxItems   = parseInt(document.getElementById('run-max-items')?.value || '0');

  const rb = document.getElementById('run-btn');
  if (rb) rb.disabled = true;

  const res = await api('POST', '/api/run', { json_file: jsonFile, batch_size: batchSize, max_workers: maxWorkers, max_items: maxItems });
  if (res.error) {
    termLine('ERROR: ' + res.error, 'err');
    if (rb) rb.disabled = false;
    return;
  }

  clearTerminal();
  _sseLineCount = 0;
  _updateSseCounter();
  termLine(`▶ Iniciando  json_file=${jsonFile}  batch_size=${batchSize}  max_workers=${maxWorkers}${maxItems ? '  max_items='+maxItems : ''}`, 'info');
  openSse();          // reconnect to get fresh stream (server resets output on start)
  await syncRunStatus();
}

async function stopRun() {
  const sb = document.getElementById('stop-btn');
  if (sb) { sb.disabled = true; sb.textContent = 'Deteniendo…'; }

  const res = await api('POST', '/api/run/stop', {});

  if (sb) sb.textContent = '■ Detener';

  if (res.error) {
    termLine('ERROR al detener: ' + res.error, 'err');
  } else {
    termLine('■ Proceso terminado.', 'ok');
  }

  if (sseSource) { sseSource.close(); sseSource = null; }
  await syncRunStatus();
}

const TERM_MAX_LINES = 500;
let _termLineCount = 0;

function termLine(text, cls = '') {
  const t = document.getElementById('terminal');
  if (!t) return;
  const auto = text.includes('ERROR') || text.includes('FAIL') ? 'err'
             : text.includes(' | OK') || text.includes('✓') || text.includes('DONE') ? 'ok'
             : text.includes('WARNING') ? 'warn'
             : text.includes('INFO') || text.includes('BATCH') || text.includes('Batch') ? 'info'
             : '';
  const div = document.createElement('div');
  div.className = 't-line ' + (cls || auto);
  div.textContent = text;
  t.appendChild(div);
  _termLineCount++;

  // Prune oldest lines to keep DOM small
  if (_termLineCount > TERM_MAX_LINES) {
    const remove = _termLineCount - TERM_MAX_LINES;
    for (let i = 0; i < remove; i++) {
      if (t.firstChild) t.removeChild(t.firstChild);
    }
    _termLineCount = TERM_MAX_LINES;
    // Keep a sticky banner so the user knows lines were trimmed
    if (!t.querySelector('.t-trim-notice')) {
      const notice = document.createElement('div');
      notice.className = 't-trim-notice';
      notice.style.cssText = 'color:var(--muted);font-size:10px;padding:2px 0;border-bottom:1px solid var(--border);margin-bottom:4px';
      notice.textContent = `-- mostrando últimas ${TERM_MAX_LINES} líneas --`;
      t.insertBefore(notice, t.firstChild);
    }
  }

  t.scrollTop = t.scrollHeight;
}

function clearTerminal() {
  const t = document.getElementById('terminal');
  if (t) t.innerHTML = '';
  _termLineCount = 0;
}

// keep old name working (used elsewhere if any)
function addTermLine(text, cls) { termLine(text, cls); }

// ── DB CLEAR ──────────────────────────────────────────────────────────────────
function confirmClearDB() {
  showConfirm(
    '¿Limpiar toda la base de datos?',
    'Se eliminarán TODOS los logs e insights. Esta acción no se puede deshacer.',
    async () => {
      const res = await api('DELETE', '/api/db');
      if (res.ok) {
        setGlobalStatus('DB limpiada', false);
        if (currentPage === 'dashboard') refreshDashboard();
      }
    }
  );
}

// ── Confirm modal ──────────────────────────────────────────────────────────────
let _confirmCb = null;
function showConfirm(title, msg, cb) {
  _confirmCb = cb;
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.remove('hidden');
}
function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); _confirmCb = null; }
document.getElementById('confirmOkBtn').onclick = () => { const cb = _confirmCb; closeConfirm(); cb && cb(); };

// ── Utils ──────────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '–';
  try {
    const d = new Date(iso);
    return d.toLocaleString('es', { dateStyle:'short', timeStyle:'short' });
  } catch { return iso; }
}

function loading(label = '') {
  return `<div class="spinner-wrap"><div class="spinner"></div>${label ? `<span>${label}</span>` : ''}</div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function setStatus(id, msg, color) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.color = color; }
  setTimeout(() => { if (el) el.textContent = ''; }, 4000);
}

function setGlobalStatus(msg, running = false) {
  document.getElementById('globalStatus').textContent = msg;
  document.getElementById('globalDot').className = 'status-dot' + (running ? '' : '');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
